<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Global Ad Network</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Sign in to your workspace</h1>
        <p class="muted">Continue where you left off and monitor your ad performance.</p>
        <img src="/login.png" alt="description" class="auth-image">
        <form id="login-form" class="auth-form">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@company.com" required />
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
          <button type="submit">Sign in</button>
        </form>
        <p class="small-link">No account? <a href="sign-in.html">Create one</a></p>
      </section>
      <section class="info-card">
        <h2>Why teams choose Global Ad Network</h2>
        <ul>
          <li>Unified campaign dashboard</li>
          <li>Faster approval workflows</li>
          <li>Revenue insights for every role</li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
